{% extends "base.html" %}

{% block title %}Удаление записи о чае{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-body">
                    <h1 class="card-title text-center mb-4">Удаление записи о чае</h1>
                    
                    <p class="text-center mb-4">
                        Вы уверены, что хотите удалить запись "{{ object.title }}"?
                        Это действие нельзя будет отменить.
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <button type="submit" class="btn btn-danger">Удалить</button>
                            <a href="{% url 'tea_collection:tea_post_detail' object.pk %}" class="btn btn-outline-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
