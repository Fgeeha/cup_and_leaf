{% extends 'base.html' %}

{% block title %}Пароль изменен{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Пароль изменен</h2>
        </div>
        <div class="auth-body">
            <div class="success-message">
                <p>Ваш пароль был успешно изменен.</p>
            </div>
            <div class="auth-links">
                <p><a href="{% url 'tea_collection:login' %}">Войти с новым паролем</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
